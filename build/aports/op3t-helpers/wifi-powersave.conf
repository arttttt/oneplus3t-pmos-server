# WiFi power-save keeps the radio dozing between AP beacons. On a
# mains-powered headless server that buys nothing and costs reliability:
# after an idle spell the first inbound packets (SSH discovery probes,
# tailnet traffic) get delayed for seconds or dropped.
# 2 = disable. Acts as the default for every Wi-Fi profile whose own
# wifi.powersave is unset/0 (profiles created by nmcli are), applied
# when the connection (re)activates.
[connection]
wifi.powersave = 2
